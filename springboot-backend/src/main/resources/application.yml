spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./springboot-backend/application-local.yml
      - optional:file:./.env.smtp[.properties]
      - optional:file:./springboot-backend/.env.smtp[.properties]
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/lawai}
    username: ${DATABASE_USERNAME:lawai}
    password: ${DATABASE_PASSWORD:lawai}
  servlet:
    multipart:
      resolve-lazily: true
      max-file-size: ${MAX_UPLOAD_MB:25}MB
      max-request-size: ${MAX_UPLOAD_REQUEST_MB:30}MB
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:false}
        connectiontimeout: ${SMTP_CONNECTION_TIMEOUT_MS:5000}
        timeout: ${SMTP_TIMEOUT_MS:5000}
        writetimeout: ${SMTP_WRITE_TIMEOUT_MS:5000}

server:
  port: 8080
  tomcat:
    max-swallow-size: -1

app:
  ai-base-url: ${AI_BASE_URL:http://localhost:8000/api}
  max-upload-mb: ${MAX_UPLOAD_MB:25}
  document:
    upload-dir: ${DOCUMENT_UPLOAD_DIR:uploads/documents}
    chunk-size: ${DOCUMENT_CHUNK_SIZE:1200}
    chunk-overlap: ${DOCUMENT_CHUNK_OVERLAP:150}
    embedding-dimensions: ${LAWAI_EMBEDDING_DIMENSIONS:768}
  opensearch:
    enabled: ${OPENSEARCH_ENABLED:true}
    base-url: ${OPENSEARCH_BASE_URL:http://localhost:9200}
    index: ${OPENSEARCH_INDEX:legal-document-chunks}
  auth:
    bootstrap-enabled: ${AUTH_BOOTSTRAP_ENABLED:true}
    bootstrap-name: ${AUTH_BOOTSTRAP_NAME:Yonetici}
    bootstrap-email: ${AUTH_BOOTSTRAP_EMAIL:admin@lawai.local}
    bootstrap-password: ${AUTH_BOOTSTRAP_PASSWORD:ChangeMe123!}
    reset-password-url-base: ${AUTH_RESET_PASSWORD_URL_BASE:http://localhost:3000}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    preview-reset-token: ${AUTH_PREVIEW_RESET_TOKEN:true}
    preview-verification-token: ${AUTH_PREVIEW_VERIFICATION_TOKEN:true}
    verification-url-base: ${AUTH_VERIFICATION_URL_BASE:http://localhost:3000}
    google-client-id: ${GOOGLE_CLIENT_ID:702835844513-puqle248iramljphtubb3558823hn6pe.apps.googleusercontent.com}
  mail:
    from: ${SMTP_FROM:no-reply@lawai.local}
  billing:
    success-url: ${BILLING_SUCCESS_URL:http://localhost:3000/subscriptions?checkout=success}
    cancel-url: ${BILLING_CANCEL_URL:http://localhost:3000/subscriptions?checkout=cancel}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# Yönetim/Actuator sağlık kontrolleri ayarları
# Eğer SMTP kimlik bilgilerini (özellikle password) sağlamadan Mail sağlık kontrolünün
# hata vermesini istemiyorsanız bu kontrolleri devre dışı bırakabilirsiniz.
# Alternatif olarak gerçek SMTP bilgilerini (SMTP_USERNAME/SMTP_PASSWORD) environment
# değişkenleri ile sağlayın.
management:
  health:
    mail:
      enabled: false

