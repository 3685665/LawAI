spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./.env.smtp[.properties]
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/lawai}
    username: ${DATABASE_USERNAME:lawai}
    password: ${DATABASE_PASSWORD:lawai}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    default-encoding: UTF-8

server:
  port: 8081

app:
  services:
    auth-base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    platform-base-url: ${PLATFORM_SERVICE_URL:http://localhost:8086}
  auth:
    bootstrap-enabled: ${AUTH_BOOTSTRAP_ENABLED:true}
    bootstrap-name: ${AUTH_BOOTSTRAP_NAME:Yonetici}
    bootstrap-email: ${AUTH_BOOTSTRAP_EMAIL:admin@lawai.local}
    bootstrap-password: ${AUTH_BOOTSTRAP_PASSWORD:ChangeMe123!}
    reset-password-url-base: ${AUTH_RESET_PASSWORD_URL_BASE:http://localhost:3000}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    preview-reset-token: ${AUTH_PREVIEW_RESET_TOKEN:false}
    preview-verification-token: ${AUTH_PREVIEW_VERIFICATION_TOKEN:false}
    verification-url-base: ${AUTH_VERIFICATION_URL_BASE:http://localhost:3000}
    google-client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${SMTP_FROM:no-reply@lawai.local}

management:
  health:
    mail:
      enabled: false
