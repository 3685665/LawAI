spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/lawai}
    username: ${DATABASE_USERNAME:lawai}
    password: ${DATABASE_PASSWORD:lawai}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8082

app:
  services:
    auth-base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    platform-base-url: ${PLATFORM_SERVICE_URL:http://localhost:8086}
  billing:
    success-url: ${BILLING_SUCCESS_URL:http://localhost:3000/subscriptions?checkout=success}
    cancel-url: ${BILLING_CANCEL_URL:http://localhost:3000/subscriptions?checkout=cancel}
    checkout-page-url: ${BILLING_CHECKOUT_PAGE_URL:http://localhost:3000/subscriptions/checkout}
    iyzico:
      auto-sync: ${IYZICO_AUTO_SYNC:false}
      api-key: ${IYZICO_API_KEY:sandbox-0KA1F9VxR8xKNSdedOOJCtJC3E7C2VyN}
      secret-key: ${IYZICO_SECRET_KEY:sandbox-mt3PiBegmBSmmIYlK7Y1t6WtdHDBwf6P}
      merchant-id: ${IYZICO_MERCHANT_ID:3428469}
      base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
      callback-url: ${IYZICO_CALLBACK_URL:http://localhost:8080/api/billing/iyzico/callback}
      default-gsm: ${IYZICO_DEFAULT_GSM:+905555555555}
      default-identity-number: ${IYZICO_DEFAULT_IDENTITY_NUMBER:11111111111}
      default-address: ${IYZICO_DEFAULT_ADDRESS:Istanbul}
      default-city: ${IYZICO_DEFAULT_CITY:Istanbul}
      default-country: ${IYZICO_DEFAULT_COUNTRY:Turkey}
      default-zip-code: ${IYZICO_DEFAULT_ZIP_CODE:34000}

management:
  health:
    mail:
      enabled: false
