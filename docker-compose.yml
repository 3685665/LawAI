services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: lawai-pgvector
    environment:
      POSTGRES_DB: lawai
      POSTGRES_USER: lawai
      POSTGRES_PASSWORD: lawai
    ports:
      - "5433:5432"
    volumes:
      - lawai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawai -d lawai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lawai_pgdata:
