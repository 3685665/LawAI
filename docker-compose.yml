
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: lawai-pgvector
    environment:
      POSTGRES_DB: lawai
      POSTGRES_USER: lawai
      POSTGRES_PASSWORD: lawai
    ports:
      - "5433:5432"
    volumes:
      - lawai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawai -d lawai"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: lawai-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "V3ctor!River#9247"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - lawai_opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  lawai_pgdata:
  lawai_opensearch_data:
